<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizMaster AI 무료 진단</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card-enter { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 text-gray-100 flex flex-col items-center px-4 py-12">

  <!-- 헤더 -->
  <header class="text-center mb-10">
    <div class="inline-flex items-center gap-2 bg-blue-600/20 border border-blue-500/30 rounded-full px-4 py-1.5 text-blue-300 text-sm mb-4">
      AI 경영진단 · 무료
    </div>
    <h1 class="text-4xl font-extrabold tracking-tight">BizMaster <span class="text-blue-400">AI</span> 무료 진단</h1>
    <p class="mt-3 text-slate-400 max-w-xl mx-auto text-sm leading-relaxed">
      사업자번호 또는 회사명을 입력하면 경정청구 가능성, 정책자금 매칭,<br/>
      미처분이익잉여금 전략을 즉시 분석해드립니다.
    </p>
  </header>

  <!-- 입력 폼 -->
  <div class="w-full max-w-lg bg-white/5 border border-white/10 rounded-2xl p-8 backdrop-blur">
    <form id="diagnoseForm" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">회사명 <span class="text-slate-500">(필수)</span></label>
        <input
          id="companyName"
          type="text"
          placeholder="예) 삼성전자, (주)모멘텀"
          class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">대표자명 <span class="text-slate-500">(선택)</span></label>
        <input
          id="ceoName"
          type="text"
          placeholder="예) 홍길동"
          class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        />
      </div>

      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-xs text-slate-500">또는</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">사업자번호 <span class="text-slate-500">(선택)</span></label>
        <input
          id="bzno"
          type="text"
          placeholder="예) 123-45-67890"
          class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        />
      </div>

      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-xl py-3.5 transition flex items-center justify-center gap-2"
      >
        <span id="btnText">진단 시작</span>
        <div id="btnSpinner" class="spinner hidden" style="width:20px;height:20px;border-width:2px;"></div>
      </button>
    </form>
  </div>

  <!-- 에러 메시지 -->
  <div id="errorBox" class="hidden mt-6 w-full max-w-lg bg-red-900/40 border border-red-500/40 rounded-xl px-5 py-4 text-red-300 text-sm"></div>

  <!-- 로딩 메시지 -->
  <div id="loadingBox" class="hidden mt-8 flex flex-col items-center gap-3 text-slate-400">
    <div class="spinner"></div>
    <p class="text-sm">Copartner에서 기업정보 조회 중 + AI 진단 생성 중…<br/><span class="text-xs text-slate-500">최대 60초 소요될 수 있습니다.</span></p>
  </div>

  <!-- 결과 섹션 -->
  <section id="resultSection" class="hidden w-full max-w-2xl mt-10 space-y-5">

    <!-- 회사명 + 핵심 요약 -->
    <div id="cardSummary" class="card-enter bg-gradient-to-br from-blue-600/20 to-indigo-600/20 border border-blue-500/30 rounded-2xl p-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-xs text-blue-300 font-semibold uppercase tracking-wide mb-1">진단 기업</p>
          <h2 id="resCompanyName" class="text-2xl font-bold"></h2>
        </div>
        <span class="shrink-0 text-xs bg-blue-600/30 text-blue-300 border border-blue-500/30 rounded-full px-3 py-1">AI 분석</span>
      </div>
      <p id="resSummary" class="mt-4 text-slate-300 text-sm leading-relaxed whitespace-pre-line"></p>
    </div>

    <!-- 세액공제 카드 -->
    <div id="cardTax" class="card-enter bg-white/5 border border-white/10 rounded-2xl p-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-2xl">💰</span>
        <h3 class="font-bold text-lg">세액공제 / 경정청구</h3>
        <span id="taxBadge" class="ml-auto text-xs font-semibold rounded-full px-3 py-1"></span>
      </div>
      <p id="taxAmount" class="text-blue-300 font-semibold text-base mb-2"></p>
      <p id="taxReason" class="text-slate-400 text-sm leading-relaxed"></p>
    </div>

    <!-- 정책자금 카드 -->
    <div id="cardPolicy" class="card-enter bg-white/5 border border-white/10 rounded-2xl p-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-2xl">🏦</span>
        <h3 class="font-bold text-lg">정책자금 매칭</h3>
      </div>
      <div id="policyList" class="space-y-3"></div>
    </div>

    <!-- 잉여금 카드 -->
    <div id="cardEarnings" class="card-enter bg-white/5 border border-white/10 rounded-2xl p-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-2xl">📊</span>
        <h3 class="font-bold text-lg">미처분이익잉여금 전략</h3>
        <span id="urgencyBadge" class="ml-auto text-xs font-semibold rounded-full px-3 py-1"></span>
      </div>
      <p id="earningsStrategy" class="text-slate-300 text-sm leading-relaxed"></p>
    </div>

    <!-- 액션 카드 -->
    <div id="cardActions" class="card-enter bg-white/5 border border-white/10 rounded-2xl p-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-2xl">✅</span>
        <h3 class="font-bold text-lg">즉시 실행 액션</h3>
      </div>
      <ol id="actionList" class="space-y-2 list-decimal list-inside text-slate-300 text-sm leading-relaxed"></ol>
    </div>

    <!-- 면책 고지 -->
    <p id="resDisclaimer" class="text-center text-xs text-slate-600 pb-8"></p>

  </section>

  <script>
    const form = document.getElementById('diagnoseForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const loadingBox = document.getElementById('loadingBox');
    const errorBox = document.getElementById('errorBox');
    const resultSection = document.getElementById('resultSection');

    function setLoading(on) {
      submitBtn.disabled = on;
      btnText.textContent = on ? '분석 중…' : '진단 시작';
      btnSpinner.classList.toggle('hidden', !on);
      loadingBox.classList.toggle('hidden', !on);
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    function hideError() {
      errorBox.classList.add('hidden');
    }

    function urgencyLabel(u) {
      if (u === 'high') return { text: '긴급', cls: 'bg-red-600/30 text-red-300 border border-red-500/30' };
      if (u === 'medium') return { text: '보통', cls: 'bg-yellow-600/30 text-yellow-300 border border-yellow-500/30' };
      return { text: '여유', cls: 'bg-green-600/30 text-green-300 border border-green-500/30' };
    }

    function renderResult(data) {
      resultSection.classList.remove('hidden');

      document.getElementById('resCompanyName').textContent = data.companyName ?? '';
      document.getElementById('resSummary').textContent = data.summary ?? '';

      // 세액공제
      const tax = data.taxRefund;
      if (tax) {
        const badge = document.getElementById('taxBadge');
        if (tax.possible) {
          badge.textContent = '가능성 있음';
          badge.className = 'ml-auto text-xs font-semibold rounded-full px-3 py-1 bg-green-600/30 text-green-300 border border-green-500/30';
        } else {
          badge.textContent = '검토 필요';
          badge.className = 'ml-auto text-xs font-semibold rounded-full px-3 py-1 bg-slate-600/30 text-slate-400 border border-slate-500/30';
        }
        document.getElementById('taxAmount').textContent = tax.estimatedAmount ?? '';
        document.getElementById('taxReason').textContent = tax.reason ?? '';
      }

      // 정책자금
      const policyList = document.getElementById('policyList');
      policyList.innerHTML = '';
      (data.policyFunds ?? []).forEach(f => {
        const div = document.createElement('div');
        div.className = 'flex items-start gap-3 bg-white/5 rounded-xl p-4';
        div.innerHTML = `
          <div class="shrink-0 w-2 h-2 rounded-full bg-blue-400 mt-1.5"></div>
          <div>
            <p class="font-semibold text-sm">${f.name ?? ''} <span class="text-blue-300">${f.amount ?? ''}</span></p>
            <p class="text-slate-400 text-xs mt-0.5">${f.match ?? ''}</p>
          </div>`;
        policyList.appendChild(div);
      });

      // 잉여금
      const earn = data.retainedEarnings;
      if (earn) {
        const { text, cls } = urgencyLabel(earn.urgency);
        const ub = document.getElementById('urgencyBadge');
        ub.textContent = text;
        ub.className = `ml-auto text-xs font-semibold rounded-full px-3 py-1 ${cls}`;
        document.getElementById('earningsStrategy').textContent = earn.strategy ?? '';
      }

      // 액션
      const actionList = document.getElementById('actionList');
      actionList.innerHTML = '';
      (data.actions ?? []).forEach(a => {
        const li = document.createElement('li');
        li.textContent = a;
        actionList.appendChild(li);
      });

      // 면책
      document.getElementById('resDisclaimer').textContent = data.disclaimer ?? '';

      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      resultSection.classList.add('hidden');

      const companyName = document.getElementById('companyName').value.trim();
      const ceoName = document.getElementById('ceoName').value.trim();
      const bzno = document.getElementById('bzno').value.trim();

      if (!companyName && !bzno) {
        showError('회사명 또는 사업자번호 중 하나를 입력해주세요.');
        return;
      }

      setLoading(true);
      try {
        const body = {};
        if (companyName) body.companyName = companyName;
        if (ceoName) body.ceoName = ceoName;
        if (bzno) body.bzno = bzno;

        const res = await fetch('/api/diagnose', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const json = await res.json();

        if (!res.ok || !json.ok) {
          showError(json.error ?? `서버 오류 (${res.status})`);
          return;
        }

        renderResult(json.data);
      } catch (err) {
        showError('네트워크 오류: ' + err.message);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
